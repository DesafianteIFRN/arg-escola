<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>jogo</title>
    <link rel="stylesheet" href="tempo.css">
        <script src="js/joguinho.js" defer></script>
</head>
<body>
    <h1>O Tempo</h1>
    <p>Acumule 1000 pontos para revelar o link.</p>

    <div class="game">
        <div id="score">Pontos: 0</div>
        
        <div id="target-area">
            <button id="target">+</button>
        </div>
        <div id="controls">
            <button id="start">Iniciar</button>
            <button id="restart">Reiniciar</button>
        </div>
        <div id="final" class="hidden">
            <!-- content updated by script -->
        </div>
    </div>


</body>
</html>
